version: '3.8'

services:
  db:
    image: postgres:15
    container_name: bond_scout_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: scout_user
      POSTGRES_PASSWORD: scout_pass
      POSTGRES_DB: bond_scout
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
